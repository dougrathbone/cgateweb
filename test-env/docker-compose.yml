name: cgateweb-test

# Local test environment for the cgateweb Home Assistant add-on.
# Simulates the HA Supervisor environment without requiring a real HA instance.
# The HA base image ships with bashio and s6-overlay, so all addon scripts run normally.
# The only thing we mock is /data/options.json, which HA Supervisor normally writes.
#
# Requires: podman + podman-compose  (brew install podman podman-compose)
# Initialise once:  podman machine init && podman machine start
#
# Usage:
#   1. Choose an options file:  cp options-managed-download.json active-options.json
#      (or copy options-managed-upload.json and drop a C-Gate zip in volumes/share/cgate/)
#   2. podman compose up --build
#   3. podman compose logs -f addon

services:
  supervisor:
    image: python:3.12-alpine
    command: python /server.py
    volumes:
      - ./mock-supervisor/server.py:/server.py:ro
      - ./active-options.json:/data/options.json:ro
    networks:
      addon-net:
        aliases:
          - supervisor

  addon:
    build:
      context: ..
      dockerfile: test-env/Dockerfile
      args:
        BUILD_FROM: ghcr.io/home-assistant/amd64-base:3.19
        BUILD_ARCH: amd64
        BUILD_DATE: "2026-01-01T00:00:00Z"
        BUILD_REF: "local-test"
        BUILD_VERSION: "dev"
    volumes:
      # Mock the options.json that HA Supervisor normally writes
      - ./active-options.json:/data/options.json:ro
      # Persistent data directory (C-Gate installs here)
      - ./volumes/data:/data
      # Share directory (drop C-Gate zip here for upload mode)
      - ./volumes/share/cgate:/share/cgate
    environment:
      - TZ=Australia/Sydney
      - SUPERVISOR_TOKEN=mock-token
    networks:
      - addon-net
    depends_on:
      - mqtt
      - supervisor
    # s6-overlay needs these capabilities
    cap_add:
      - SYS_PTRACE

  mqtt:
    image: eclipse-mosquitto:2.0
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    networks:
      - addon-net

networks:
  addon-net:
    driver: bridge

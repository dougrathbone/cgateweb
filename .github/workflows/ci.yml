# .github/workflows/ci.yml

name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Restrict the default GITHUB_TOKEN to read-only. No job here writes to the
# repository via GITHUB_TOKEN (artifact upload does not require contents:write).
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so the
# runner queue is not clogged by stale jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: package.json / config.yaml version sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
    - name: Verify versions match
      run: |
        pkg_version=$(node -p "require('./package.json').version")
        cfg_version=$(grep -E '^version:' homeassistant-addon/config.yaml | sed -E 's/^version:[[:space:]]*"?([^"]+)"?$/\1/')
        echo "package.json version: ${pkg_version}"
        echo "config.yaml  version: ${cfg_version}"
        if [[ "${pkg_version}" != "${cfg_version}" ]]; then
          echo "::error::package.json version (${pkg_version}) does not match homeassistant-addon/config.yaml version (${cfg_version})."
          echo "::error::Bump both files together before pushing (see CLAUDE.md release process)."
          exit 1
        fi

  validate-addon:
    name: Validate add-on config & translations
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
    - name: Use Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
      with:
        node-version: 22.x
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Validate config.yaml options/schema upgrade safety
      run: npm run validate:addon-config
    - name: Validate translation key parity
      run: npm run validate:translations

  static-checks:
    name: Lint workflows, shell scripts & Dockerfiles
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: "1.7.12"
      HADOLINT_VERSION: "2.14.0"
    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: ShellCheck add-on scripts
      # shellcheck is preinstalled on ubuntu-latest. SC1008 is excluded because
      # the s6-overlay scripts use the '#!/usr/bin/with-contenv bashio' shebang.
      run: |
        shellcheck --shell=bash --severity=warning --exclude=SC1008 \
          homeassistant-addon/run.sh \
          homeassistant-addon/rootfs/etc/cont-init.d/*.sh \
          homeassistant-addon/rootfs/etc/services.d/*/run \
          homeassistant-addon/rootfs/etc/services.d/*/finish

    - name: actionlint
      run: |
        curl -fsSL -o /tmp/actionlint.tar.gz \
          "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
        tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
        /tmp/actionlint -color

    - name: hadolint
      run: |
        curl -fsSL -o /tmp/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /tmp/hadolint
        /tmp/hadolint homeassistant-addon/Dockerfile test-env/Dockerfile

  test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest
    needs: version-sync

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint -- --max-warnings=0

    - name: Unit tests with coverage
      run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      # Jest enforces the thresholds defined in package.json (≥80% statements/lines globally).
      # PRs that drop coverage below those thresholds will fail here.

    - name: Upload coverage report
      if: matrix.node-version == '22.x'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: coverage-report
        path: coverage/lcov.info
        retention-days: 7

  integration:
    name: Integration test (C-Gate)
    runs-on: ubuntu-latest
    # Only run on push to main branches — not on PRs — to avoid long waits during review.
    if: github.event_name == 'push'
    timeout-minutes: 20
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: Use Node.js 20.x
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install podman-compose
      run: pip3 install podman-compose

    - name: Set up managed-download test options
      run: cp test-env/options-managed-download.json test-env/active-options.json

    - name: Run integration test (managed mode - downloads C-Gate)
      run: node test-env/integration-test.js
      timeout-minutes: 15

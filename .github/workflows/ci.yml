# .github/workflows/ci.yml

name: Node.js CI

on:
  push:
    branches: [ "main", "master" ] # Adjust branches as needed
  pull_request:
    branches: [ "main", "master" ] # Adjust branches as needed

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Specify Node versions to test against
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci # Use npm ci for cleaner installs in CI
      
    - name: Run lint
      run: npm run lint -- --max-warnings=0

    - name: Run unit tests
      run: npm test -- --coverage # Use npm test script which should call jest

  integration:
    runs-on: ubuntu-latest
    # Only run on push to main branches (not on PRs) to avoid long waits in review
    if: github.event_name == 'push'
    # Network download of C-Gate can be slow; mark non-blocking so a flaky
    # Schneider download does not gate merges
    continue-on-error: true
    timeout-minutes: 20
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install podman-compose
      run: pip3 install podman-compose

    - name: Set up managed-download test options
      run: cp test-env/options-managed-download.json test-env/active-options.json

    - name: Run integration test (managed mode - downloads C-Gate)
      run: node test-env/integration-test.js
      timeout-minutes: 15
# .github/workflows/ci.yml

name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Restrict the default GITHUB_TOKEN to read-only. No job here writes to the
# repository via GITHUB_TOKEN (artifact upload does not require contents:write).
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so the
# runner queue is not clogged by stale jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: package.json / config.yaml version sync
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Verify versions match
      run: |
        pkg_version=$(node -p "require('./package.json').version")
        cfg_version=$(grep -E '^version:' homeassistant-addon/config.yaml | sed -E 's/^version:[[:space:]]*"?([^"]+)"?$/\1/')
        echo "package.json version: ${pkg_version}"
        echo "config.yaml  version: ${cfg_version}"
        if [[ "${pkg_version}" != "${cfg_version}" ]]; then
          echo "::error::package.json version (${pkg_version}) does not match homeassistant-addon/config.yaml version (${cfg_version})."
          echo "::error::Bump both files together before pushing (see CLAUDE.md release process)."
          exit 1
        fi

  validate-addon:
    name: Validate add-on config & translations
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 22.x
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Validate config.yaml options/schema upgrade safety
      run: npm run validate:addon-config
    - name: Validate translation key parity
      run: npm run validate:translations
    - name: Validate schema <-> translation parity
      run: npm run validate:schema-i18n
    - name: Typecheck (tsc --noEmit)
      run: npm run typecheck

  static-checks:
    name: Lint workflows, shell scripts & Dockerfiles
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: "1.7.12"
      HADOLINT_VERSION: "2.14.0"
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: ShellCheck add-on scripts
      # shellcheck is preinstalled on ubuntu-latest. SC1008 is excluded because
      # the s6-overlay scripts use the '#!/usr/bin/with-contenv bashio' shebang.
      run: |
        shellcheck --shell=bash --severity=warning --exclude=SC1008 \
          homeassistant-addon/run.sh \
          homeassistant-addon/rootfs/etc/cont-init.d/*.sh \
          homeassistant-addon/rootfs/etc/services.d/*/run \
          homeassistant-addon/rootfs/etc/services.d/*/finish

    - name: actionlint
      run: |
        curl -fsSL -o /tmp/actionlint.tar.gz \
          "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
        tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
        /tmp/actionlint -color

    - name: hadolint
      run: |
        curl -fsSL -o /tmp/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /tmp/hadolint
        /tmp/hadolint homeassistant-addon/Dockerfile test-env/Dockerfile

  test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest
    needs: version-sync

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint -- --max-warnings=0

    - name: Unit tests with coverage
      run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      # Jest enforces the thresholds defined in package.json (≥80% statements/lines globally).
      # PRs that drop coverage below those thresholds will fail here.

    - name: Upload coverage report
      if: matrix.node-version == '22.x'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
      with:
        name: coverage-report
        path: coverage/lcov.info
        retention-days: 7

  addon-image:
    name: Build add-on image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    # Build the real add-on image for every architecture the add-on ships to,
    # so arch-specific breakage (base image tags, native modules under
    # emulation) is caught in CI rather than on users' devices. Non-amd64
    # builds run under QEMU binfmt emulation.
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64, armv7]
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Set up QEMU (multi-arch emulation)
      if: matrix.arch != 'amd64'
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

    - name: Assemble add-on build context
      # The production homeassistant-addon/Dockerfile expects package.json,
      # src/, public/, index.js and the add-on files (rootfs/, run.sh) all in
      # one context directory — the same layout the distribution workflow ships
      # to users. Mirror that here so CI builds the real image, not a copy.
      run: |
        mkdir -p ctx
        cp -r homeassistant-addon/rootfs ctx/
        cp homeassistant-addon/run.sh ctx/
        cp homeassistant-addon/Dockerfile ctx/
        cp -r src public ctx/
        cp index.js package.json package-lock.json ctx/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

    - name: Build image
      # BuildKit + BUILDPLATFORM lets the npm install stage run on the host
      # arch (pure JS deps), avoiding QEMU SIGILL during npm ci on aarch64.
      env:
        DOCKER_BUILDKIT: 1
      run: |
        case "${{ matrix.arch }}" in
          amd64) platform=linux/amd64 ;;
          aarch64) platform=linux/arm64 ;;
          armv7) platform=linux/arm/v7 ;;
          *) echo "Unknown arch ${{ matrix.arch }}"; exit 1 ;;
        esac
        docker buildx build \
          --platform "$platform" \
          --build-arg BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19 \
          --build-arg BUILD_ARCH=${{ matrix.arch }} \
          --build-arg BUILD_VERSION=ci \
          --build-arg BUILD_DATE=ci \
          --build-arg BUILD_REF="${GITHUB_SHA}" \
          --load \
          -t cgateweb-addon:ci-${{ matrix.arch }} \
          ctx

    - name: Smoke-check image contents
      # Override the s6/bashio entrypoint (which needs the HA Supervisor) and
      # assert the image is structurally sound: Node present, app files and
      # production dependencies installed, and the entrypoint script in place.
      # For non-amd64 the container runs under QEMU emulation.
      run: |
        case "${{ matrix.arch }}" in
          amd64) platform=linux/amd64 ;;
          aarch64) platform=linux/arm64 ;;
          armv7) platform=linux/arm/v7 ;;
        esac
        docker run --rm --platform "$platform" --entrypoint /bin/bash cgateweb-addon:ci-${{ matrix.arch }} -c '
          set -e
          command -v node
          test -f /run.sh
          test -f /app/index.js
          test -d /app/node_modules
          node -e "require(\"/app/package.json\")"
        '

  # Boot the full managed stack against each openly-downloadable C-Gate version
  # so version-specific regressions (e.g. the 3.7.x TREEXML addressing bug, #23)
  # are caught. Only 3.3.0-3.3.2 are downloadable without a Schneider login;
  # newer versions (3.3.3, 3.7.x) are exercised by the upload leg below.
  integration-download:
    name: Integration download ${{ matrix.cgate.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    strategy:
      fail-fast: false
      matrix:
        cgate:
          - version: "3.3.1"
            url: "https://download.se.com/files?p_Doc_Ref=C-Gate_3_Linux_Package_V3.3.1"
          - version: "3.3.2"
            url: "https://download.se.com/files?p_Doc_Ref=C-Gate_3_Linux_Package_V3.3.2"

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Use Node.js 20.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install podman-compose
      run: pip3 install podman-compose

    - name: Set up managed-download options for C-Gate ${{ matrix.cgate.version }}
      env:
        CGATE_URL: ${{ matrix.cgate.url }}
      run: |
        node -e "const fs=require('fs');const o=require('./test-env/options-managed-download.json');o.cgate_download_url=process.env.CGATE_URL;fs.writeFileSync('test-env/active-options.json',JSON.stringify(o,null,2));"

    - name: Run integration test (download C-Gate ${{ matrix.cgate.version }})
      run: node test-env/integration-test.js
      timeout-minutes: 15

  # Exercises a C-Gate version that is NOT openly downloadable (3.3.3, 3.7.x) by
  # fetching a self-hosted zip and installing it via upload mode. Activates only
  # when the CGATE_UPLOAD_TEST_URL repository variable points at a hosted zip
  # (e.g. a release asset on this repo); otherwise the job is skipped, which the
  # aggregator below treats as a pass.
  integration-upload:
    name: Integration upload (hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: vars.CGATE_UPLOAD_TEST_URL != ''

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

    - name: Use Node.js 20.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install podman-compose
      run: pip3 install podman-compose

    - name: Fetch hosted C-Gate zip into the upload share volume
      env:
        CGATE_UPLOAD_TEST_URL: ${{ vars.CGATE_UPLOAD_TEST_URL }}
      run: |
        mkdir -p test-env/volumes/share/cgate
        curl -fSL --max-time 600 --connect-timeout 30 -o test-env/volumes/share/cgate/cgate-hosted.zip "$CGATE_UPLOAD_TEST_URL"

    - name: Set up managed-upload test options
      run: cp test-env/options-managed-upload.json test-env/active-options.json

    - name: Run integration test (upload mode - hosted C-Gate)
      run: node test-env/integration-test.js
      timeout-minutes: 15

  # Required status check. Stays green only if every download-mode leg passed and
  # the upload leg passed or was skipped. Keeping this single, stable job name
  # ("Integration test (C-Gate)") means branch protection needs no change when we
  # add or remove matrix versions.
  integration:
    name: Integration test (C-Gate)
    runs-on: ubuntu-latest
    needs: [integration-download, integration-upload]
    if: always()

    steps:
    - name: Verify all C-Gate version integration tests passed
      env:
        DOWNLOAD_RESULT: ${{ needs.integration-download.result }}
        UPLOAD_RESULT: ${{ needs.integration-upload.result }}
      run: |
        echo "download-mode legs: $DOWNLOAD_RESULT"
        echo "upload-mode leg:    $UPLOAD_RESULT (skipped is OK when no hosted artifact is configured)"
        if [[ "$DOWNLOAD_RESULT" != "success" ]]; then
          echo "::error::One or more download-mode C-Gate integration tests failed."
          exit 1
        fi
        if [[ "$UPLOAD_RESULT" != "success" && "$UPLOAD_RESULT" != "skipped" ]]; then
          echo "::error::The upload-mode C-Gate integration test failed."
          exit 1
        fi
        echo "All required C-Gate integration tests passed."

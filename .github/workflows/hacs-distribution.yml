name: Build and Deploy Home Assistant Addon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DISTRIBUTION_REPO: 'dougrathbone/cgateweb-homeassistant'

# Restrict the default GITHUB_TOKEN to read-only. Cross-repo push and release
# creation use the HACS_DEPLOY_TOKEN PAT, not GITHUB_TOKEN, so read is enough.
permissions:
  contents: read

# Do not cancel in-progress deploys — overlapping tag pushes should queue,
# not abort a half-finished distribution publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-sync:
    name: Verify version sync (tag / package.json / config.yaml)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Verify versions match
      run: |
        pkg_version=$(node -p "require('./package.json').version")
        cfg_version=$(grep -E '^version:' homeassistant-addon/config.yaml | sed -E 's/^version:[[:space:]]*"?([^"]+)"?$/\1/')
        echo "package.json version: ${pkg_version}"
        echo "config.yaml  version: ${cfg_version}"
        if [[ "${pkg_version}" != "${cfg_version}" ]]; then
          echo "::error::package.json version (${pkg_version}) does not match homeassistant-addon/config.yaml version (${cfg_version})."
          echo "::error::Bump both files together before tagging (see CLAUDE.md release process)."
          exit 1
        fi
        # On a tag push, the tag must also match the source version so a mistyped
        # tag cannot publish a mismatched distribution release.
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          tag_version=${GITHUB_REF#refs/tags/}
          tag_version=${tag_version#v}
          echo "git tag       version: ${tag_version}"
          if [[ "${tag_version}" != "${pkg_version}" ]]; then
            echo "::error::Git tag version (${tag_version}) does not match package.json version (${pkg_version})."
            echo "::error::Tag the commit that bumps package.json/config.yaml (e.g. git tag v${pkg_version})."
            exit 1
          fi
        fi

  validate-addon:
    name: Validate add-on config & translations
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm ci
    - run: npm run validate:addon-config
    - run: npm run validate:translations
    - run: npm run validate:schema-i18n
    - run: npm run typecheck

  static-checks:
    name: Lint workflows, shell scripts & Dockerfiles
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: "1.7.12"
      HADOLINT_VERSION: "2.14.0"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: ShellCheck add-on scripts
      run: |
        shellcheck --shell=bash --severity=warning --exclude=SC1008 \
          homeassistant-addon/run.sh \
          homeassistant-addon/rootfs/etc/cont-init.d/*.sh \
          homeassistant-addon/rootfs/etc/services.d/*/run \
          homeassistant-addon/rootfs/etc/services.d/*/finish
    - name: actionlint
      run: |
        curl -fsSL -o /tmp/actionlint.tar.gz \
          "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
        tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
        /tmp/actionlint -color
    - name: hadolint
      run: |
        curl -fsSL -o /tmp/hadolint \
          "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
        chmod +x /tmp/hadolint
        /tmp/hadolint homeassistant-addon/Dockerfile test-env/Dockerfile

  test:
    needs: version-sync
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run lint -- --max-warnings=0
    - run: npm test -- --coverage

  addon-image:
    name: Build add-on image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64, armv7]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - name: Set up QEMU (multi-arch emulation)
      if: matrix.arch != 'amd64'
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
    - name: Assemble add-on build context
      run: |
        mkdir -p ctx
        cp -r homeassistant-addon/rootfs ctx/
        cp homeassistant-addon/run.sh ctx/
        cp homeassistant-addon/Dockerfile ctx/
        cp -r src public ctx/
        cp index.js package.json package-lock.json ctx/
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
    - name: Build image
      env:
        DOCKER_BUILDKIT: 1
      run: |
        case "${{ matrix.arch }}" in
          amd64) platform=linux/amd64 ;;
          aarch64) platform=linux/arm64 ;;
          armv7) platform=linux/arm/v7 ;;
          *) echo "Unknown arch ${{ matrix.arch }}"; exit 1 ;;
        esac
        docker buildx build \
          --platform "$platform" \
          --build-arg BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19 \
          --build-arg BUILD_ARCH=${{ matrix.arch }} \
          --build-arg BUILD_VERSION=ci \
          --build-arg BUILD_DATE=ci \
          --build-arg BUILD_REF="${GITHUB_SHA}" \
          --load \
          -t cgateweb-addon:ci-${{ matrix.arch }} \
          ctx
    - name: Smoke-check image contents
      run: |
        case "${{ matrix.arch }}" in
          amd64) platform=linux/amd64 ;;
          aarch64) platform=linux/arm64 ;;
          armv7) platform=linux/arm/v7 ;;
        esac
        docker run --rm --platform "$platform" --entrypoint /bin/bash cgateweb-addon:ci-${{ matrix.arch }} -c '
          set -e
          command -v node
          test -f /run.sh
          test -f /app/index.js
          test -d /app/node_modules
          node -e "require(\"/app/package.json\")"
        '

  integration-download:
    name: Integration download ${{ matrix.cgate.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    strategy:
      fail-fast: false
      matrix:
        cgate:
          - version: "3.3.1"
            url: "https://download.se.com/files?p_Doc_Ref=C-Gate_3_Linux_Package_V3.3.1"
          - version: "3.3.2"
            url: "https://download.se.com/files?p_Doc_Ref=C-Gate_3_Linux_Package_V3.3.2"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 20.x
        cache: 'npm'
    - run: npm ci
    - name: Install podman-compose
      run: pip3 install podman-compose
    - name: Set up managed-download options for C-Gate ${{ matrix.cgate.version }}
      env:
        CGATE_URL: ${{ matrix.cgate.url }}
      run: |
        node -e "const fs=require('fs');const o=require('./test-env/options-managed-download.json');o.cgate_download_url=process.env.CGATE_URL;fs.writeFileSync('test-env/active-options.json',JSON.stringify(o,null,2));"
    - name: Run integration test (download C-Gate ${{ matrix.cgate.version }})
      run: node test-env/integration-test.js
      timeout-minutes: 15

  integration-upload:
    name: Integration upload (hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: vars.CGATE_UPLOAD_TEST_URL != ''
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 20.x
        cache: 'npm'
    - run: npm ci
    - name: Install podman-compose
      run: pip3 install podman-compose
    - name: Fetch hosted C-Gate zip into the upload share volume
      env:
        CGATE_UPLOAD_TEST_URL: ${{ vars.CGATE_UPLOAD_TEST_URL }}
      run: |
        mkdir -p test-env/volumes/share/cgate
        curl -fSL --max-time 600 --connect-timeout 30 -o test-env/volumes/share/cgate/cgate-hosted.zip "$CGATE_UPLOAD_TEST_URL"
    - name: Set up managed-upload test options
      run: cp test-env/options-managed-upload.json test-env/active-options.json
    - name: Run integration test (upload mode - hosted C-Gate)
      run: node test-env/integration-test.js
      timeout-minutes: 15

  integration:
    name: Integration test (C-Gate)
    runs-on: ubuntu-latest
    needs: [integration-download, integration-upload]
    if: always()
    steps:
    - name: Verify all C-Gate version integration tests passed
      env:
        DOWNLOAD_RESULT: ${{ needs.integration-download.result }}
        UPLOAD_RESULT: ${{ needs.integration-upload.result }}
      run: |
        echo "download-mode legs: $DOWNLOAD_RESULT"
        echo "upload-mode leg:    $UPLOAD_RESULT (skipped is OK when no hosted artifact is configured)"
        if [[ "$DOWNLOAD_RESULT" != "success" ]]; then
          echo "::error::One or more download-mode C-Gate integration tests failed."
          exit 1
        fi
        if [[ "$UPLOAD_RESULT" != "success" && "$UPLOAD_RESULT" != "skipped" ]]; then
          echo "::error::The upload-mode C-Gate integration test failed."
          exit 1
        fi
        echo "All required C-Gate integration tests passed."

  build-and-deploy:
    # Only publish to the distribution repo from semver tags. workflow_dispatch
    # still runs the quality gates above for manual verification, but must not
    # push timestamp versions onto distribution main.
    #
    # always() is required: integration-upload is often skipped (no hosted
    # artifact var), and a plain `if:` without always() causes this job to be
    # skipped whenever any upstream job was skipped — even when integration
    # itself succeeded via its own always() gate.
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.version-sync.result == 'success' &&
      needs.validate-addon.result == 'success' &&
      needs.static-checks.result == 'success' &&
      needs.test.result == 'success' &&
      needs.addon-image.result == 'success' &&
      needs.integration.result == 'success'
    needs: [version-sync, validate-addon, static-checks, test, addon-image, integration]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
        else
          echo "::error::build-and-deploy is tag-only; refusing non-tag ref ${GITHUB_REF}"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Build distribution structure
      run: |
        # HA addon repos require: repository.yaml at root, each addon in a subfolder
        mkdir -p distribution/cgateweb

        # Copy addon metadata files into the addon subfolder
        cp homeassistant-addon/config.yaml distribution/cgateweb/
        cp homeassistant-addon/Dockerfile distribution/cgateweb/
        cp homeassistant-addon/build.yaml distribution/cgateweb/
        cp homeassistant-addon/run.sh distribution/cgateweb/
        cp homeassistant-addon/DOCS.md distribution/cgateweb/
        cp homeassistant-addon/CHANGELOG.md distribution/cgateweb/
        cp homeassistant-addon/README.md distribution/cgateweb/
        cp homeassistant-addon/icon.png distribution/cgateweb/
        cp homeassistant-addon/logo.png distribution/cgateweb/

        # Copy translations
        cp -r homeassistant-addon/translations distribution/cgateweb/

        # Copy rootfs (s6-overlay services)
        cp -r homeassistant-addon/rootfs distribution/cgateweb/

        # Copy application source
        cp -r src distribution/cgateweb/
        cp -r public distribution/cgateweb/
        cp index.js distribution/cgateweb/
        cp package.json distribution/cgateweb/
        cp package-lock.json distribution/cgateweb/

        # Update version in config.yaml
        sed -i "s/version: .*/version: \"${{ steps.version.outputs.version }}\"/" distribution/cgateweb/config.yaml

        # Copy repository-level branding and documentation
        cp homeassistant-addon/logo.png distribution/
        cp homeassistant-addon/icon.png distribution/
        cp homeassistant-addon/repository-README.md distribution/README.md
        cp homeassistant-addon/LICENSE distribution/LICENSE
        cp homeassistant-addon/LICENSE distribution/cgateweb/LICENSE

        # Create repository.yaml at the distribution root. Built with printf so
        # the generated file can never inherit leading whitespace from the
        # surrounding YAML block indentation (a heredoc body would).
        {
          printf '%s\n' 'name: C-Gate Web Bridge Add-on Repository'
          printf '%s\n' 'url: https://github.com/dougrathbone/cgateweb-homeassistant'
          printf '%s\n' 'maintainer: Doug Rathbone <doug@dougrathbone.com>'
        } > distribution/repository.yaml

    - name: Checkout or initialize distribution repository
      env:
        HACS_DEPLOY_TOKEN: ${{ secrets.HACS_DEPLOY_TOKEN }}
        DIST_REPO: ${{ env.DISTRIBUTION_REPO }}
      run: |
        # Token is exposed only via env, never substituted into the rendered
        # workflow command line - prevents log leakage if `set -x` ever fires.
        REMOTE_URL="https://x-access-token:${HACS_DEPLOY_TOKEN}@github.com/${DIST_REPO}.git"
        if git clone "${REMOTE_URL}" hacs-repo 2>/dev/null; then
          cd hacs-repo
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          elif git show-ref --verify --quiet refs/heads/master; then
            git checkout master
            git branch -m master main
          else
            git checkout -b main
          fi
        else
          mkdir hacs-repo
          cd hacs-repo
          git init --initial-branch=main
          git remote add origin "${REMOTE_URL}"
        fi

        git config user.name 'cgateweb-bot'
        git config user.email 'actions@github.com'

    - name: Deploy to distribution repository
      run: |
        cd hacs-repo

        # Clear existing content (except .git)
        find . -mindepth 1 -name '.git' -prune -o -type f -exec rm {} + 2>/dev/null || true
        find . -mindepth 1 -name '.git' -prune -o -type d -exec rm -rf {} + 2>/dev/null || true

        # Copy new distribution files
        cp -r ../distribution/* .

        git add .

        if git diff --staged --quiet; then
          echo "No changes to deploy"
          exit 0
        fi

        git commit -m "Release v${{ steps.version.outputs.version }}

        Source: ${{ github.repository }}@${{ github.sha }}"

        if ! git push -u origin main; then
          echo "Failed to push to distribution repository"
          exit 1
        fi

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
      with:
        repository: ${{ env.DISTRIBUTION_REPO }}
        token: ${{ secrets.HACS_DEPLOY_TOKEN }}
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        body: |
          ## C-Gate Web Bridge v${{ steps.version.outputs.version }}

          Home Assistant add-on release.

          ### Installation

          1. Add repository: `https://github.com/dougrathbone/cgateweb-homeassistant`
          2. Install "C-Gate Web Bridge" from the add-on store
          3. Configure C-Gate and MQTT settings

          ### Changes

          See [main repository releases](https://github.com/dougrathbone/cgateweb/releases).

          ---
          Source: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        draft: false
        prerelease: false
